name: Build and Release

on:
  push:
    branches: [dev]
    tags: ['debug*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: PDFOS-Windows-Debug
            ext: .exe
          - os: ubuntu-latest
            artifact: PDFOS-Linux-Debug
            ext: ""
          - os: macos-latest
            artifact: PDFOS-macOS-Debug
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --no-progress

      - name: Install UPX (Linux/macOS)
        if: runner.os != 'Windows'
        run: sudo apt-get install -y upx-ucl || brew install upx || true

      - name: Build executable
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --name "PDFOS" --exclude-module pandas --exclude-module matplotlib --exclude-module scipy --exclude-module notebook --exclude-module IPython --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module PySide6 --exclude-module PySide2 --exclude-module sphinx --add-data "core${{ runner.os == 'Windows' && ';' || ':' }}core" --add-data "ui${{ runner.os == 'Windows' && ';' || ':' }}ui" --add-data "utils${{ runner.os == 'Windows' && ';' || ':' }}utils" --add-data "assets${{ runner.os == 'Windows' && ';' || ':' }}assets" --collect-all customtkinter --hidden-import psutil --hidden-import PIL._tkinter_finder main.py

      - name: Package artifact
        shell: bash
        run: |
          cd dist
          tar -czf ../${{ matrix.artifact }}.tar.gz PDFOS/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "debug-build-latest"
          name: "PDFOS Developer/Debug Build"
          body: |
            ## PDFOS - Diagnostic Debug Build
            
            This special release contains advanced real-time telemetry, memory-dump logging, and automated Telegram bot network relays.
            
            **⚠️ Only use this version if requested by developers to diagnose system crashes!**
            
            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows | `PDFOS-Windows-Debug.tar.gz` |
            | Linux | `PDFOS-Linux-Debug.tar.gz` |
            | macOS | `PDFOS-macOS-Debug.tar.gz` |
          files: |
            PDFOS-Windows-Debug/PDFOS-Windows-Debug.tar.gz
            PDFOS-Linux-Debug/PDFOS-Linux-Debug.tar.gz
            PDFOS-macOS-Debug/PDFOS-macOS-Debug.tar.gz
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
