stages:
  - build
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

.build_template: &build_template
  stage: build
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pyinstaller
    - python -m PyInstaller --noconfirm --onedir --windowed --name "PDFOS"
      --exclude-module pandas --exclude-module matplotlib --exclude-module scipy
      --exclude-module notebook --exclude-module IPython
      --exclude-module PySide2 --exclude-module sphinx
      --add-data "core:core" --add-data "ui:ui" --add-data "utils:utils"
      --add-data "assets:assets" --collect-all customtkinter
      --hidden-import psutil --hidden-import PIL._tkinter_finder main.py
    - cd dist && tar -czf ../PDFOS-${PLATFORM}.tar.gz PDFOS/
  artifacts:
    paths:
      - PDFOS-${PLATFORM}.tar.gz
    expire_in: 1 week

build:windows:
  <<: *build_template
  tags: [windows]
  variables:
    PLATFORM: Windows
  before_script:
    - choco install python --version=3.12 -y || true
    - choco install upx --no-progress -y || true
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pyinstaller
    - python -m PyInstaller --noconfirm --onedir --windowed --name "PDFOS"
      --exclude-module pandas --exclude-module matplotlib --exclude-module scipy --exclude-module notebook --exclude-module IPython --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module PySide6 --exclude-module PySide2 --exclude-module sphinx
      --add-data "core;core" --add-data "ui;ui" --add-data "utils;utils"
      --add-data "assets;assets" --collect-all customtkinter
      --hidden-import psutil --hidden-import PIL._tkinter_finder main.py
    - cd dist && tar -czf ../PDFOS-Windows.tar.gz PDFOS/

build:linux:
  <<: *build_template
  image: python:3.12
  variables:
    PLATFORM: Linux
  before_script:
    - apt-get update && apt-get install -y python3-tk upx-ucl

build:macos:
  <<: *build_template
  tags: [macos]
  variables:
    PLATFORM: macOS

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
    - job: build:macos
      artifacts: true
  script:
    - echo "Creating release v1.24.0"
  release:
    tag_name: "v1.24.0-$CI_PIPELINE_IID"
    name: "PDFOS v1.24.0"
    description: |
      ## PDFOS - PDF - OS (Open Source) v1.24.0

      ### Features
      - Conversion: PDF to/from 12+ formats
      - Pages: Merge, Split, Rotate, Delete, Extract, Reverse, Crop
      - Editing: Watermarks, Headers, Footers, Page Numbers, Redaction
      - Extraction: Text, Images, Tables, Metadata, Fonts, Links, Search
      - Security: Encrypt, Decrypt, Permissions
      - Optimize: Compress, Linearize, Downsample, Repair, Grayscale
      - System: 75% Auto CPU/RAM limits
    assets:
      links:
        - name: "PDFOS-Linux"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/main/raw/PDFOS-Linux.tar.gz?job=build:linux"
        - name: "PDFOS-Windows"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/main/raw/PDFOS-Windows.tar.gz?job=build:windows"
        - name: "PDFOS-macOS"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/main/raw/PDFOS-macOS.tar.gz?job=build:macos"
